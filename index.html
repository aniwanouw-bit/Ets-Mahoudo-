function updateMenuForUser(user) {
  const menuAuth = document.querySelector('.menu-item[data-page="auth"]');
  if (user) {
    menuAuth.innerHTML = '🚪 Déconnexion';
    menuAuth.style.display = 'block';
    menuAuth.replaceWith(menuAuth.cloneNode(true));
    const newMenuAuth = document.querySelector('.menu-item[data-page="auth"]');
    newMenuAuth.addEventListener('click', function(e) {
      e.stopPropagation();
      signOut(auth).then(() => {
        alert("👋 Vous êtes déconnecté.");
        afficherPage('accueil');
      }).catch((error) => {
        alert("Erreur : " + error.message);
      });
    });
  } else {
    menuAuth.innerHTML = '🔐 Connexion';
    menuAuth.style.display = 'block';
    menuAuth.replaceWith(menuAuth.cloneNode(true));
    const newMenuAuth = document.querySelector('.menu-item[data-page="auth"]');
    newMenuAuth.addEventListener('click', function() {
      afficherPage('auth');
    });
  }
}

// ----- 5. SURVEILLER L'ÉTAT DE CONNEXION -----
onAuthStateChanged(auth, (user) => {
  if (user) {
    userNameSpan.textContent = user.email;
    updateMenuForUser(user);
    const activePage = document.querySelector('.menu-item.active');
    if (activePage && activePage.dataset.page === 'auth') {
      afficherPage('accueil');
    }
    if (activePage && activePage.dataset.page === 'produits') {
      afficherPage('produits');
    }
  } else {
    userNameSpan.textContent = 'Visiteur';
    updateMenuForUser(null);
    const activePage = document.querySelector('.menu-item.active');
    if (activePage && activePage.dataset.page === 'produits') {
      afficherPage('produits');
    }
  }
});

// ----- 7. PANIER -----
window.ajouterAuPanier = function(nom, prix) {
  const existant = cart.find(item => item.nom === nom);
  if (existant) {
    existant.quantite += 1;
  } else {
    cart.push({ nom: nom, prix: prix, quantite: 1 });
  }
  calculerPanier();
  alert("✅ " + nom + " (" + prix + " FCFA) ajouté au panier !");
};

window.viderPanier = function() {
  if (cart.length === 0) {
    alert("🛒 Votre panier est déjà vide !");
    return;
  }
  if (confirm("⚠️ Voulez-vous vraiment vider tout votre panier ?")) {
    cart = [];
    calculerPanier();
    alert("🗑️ Panier vidé !");
  }
};

function calculerPanier() {
  let count = 0, total = 0;
  cart.forEach(item => {
    count += item.quantite;
    total += item.prix * item.quantite;
  });
  cartCount = count;
  cartTotal = total;
  updateCartDisplay();
}

function updateCartDisplay() {
  document.getElementById('cartCount').textContent = cartCount;
  let totalFormate = cartTotal.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
  document.getElementById('cartTotal').textContent = totalFormate + " FCFA";
}

  item.addEventListener('click', function(e) {
    if (this.dataset.page === 'auth' && auth.currentUser) return;
    afficherPage(this.dataset.page);
  });
});

updateCartDisplay();
afficherPage('accueil');
