// 🔑 1. CONFIGURATION (À MODIFIER)
// ============================================================

    gel: "https://i.ibb.co/wrxqHWSJ/70542.jpg",

// ============================================================
// 2. PANIER
// ============================================================
let panier = [];

const panierNombre = document.getElementById('panierNombre');
const panierTotal = document.getElementById('panierTotal');
const btnViderPanier = document.getElementById('btnViderPanier');
const messageStatus = document.getElementById('messageStatus');

function ajouterAuPanier(nom, prix) {
    const existant = panier.find(item => item.nom === nom);
    if (existant) {
        existant.quantite += 1;
    } else {
        panier.push({ nom, prix, quantite: 1 });
    }
    mettreAJourPanier();
    messageStatus.textContent = '✅ ' + nom + ' ajouté !';
    setTimeout(() => { messageStatus.textContent = ''; }, 3000);
}

function viderPanier() {
    if (panier.length === 0) {
        messageStatus.textContent = '🛒 Panier déjà vide';
        setTimeout(() => { messageStatus.textContent = ''; }, 2000);
        return;
    }
    if (confirm('⚠️ Vider tout le panier ?')) {
        panier = [];
        mettreAJourPanier();
        messageStatus.textContent = '🗑️ Panier vidé !';
        setTimeout(() => { messageStatus.textContent = ''; }, 2000);
    }
}

function mettreAJourPanier() {
    let nombre = 0;
    let total = 0;
    panier.forEach(item => {
        nombre += item.quantite;
        total += item.prix * item.quantite;
    });
    panierNombre.textContent = nombre;
    panierTotal.textContent = total.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ") + ' FCFA';
}

btnViderPanier.addEventListener('click', viderPanier);

// ============================================================
// 3. PAIEMENT KKIAPAY (CORRIGÉE)
// ============================================================
function lancerPaiementKKiaPay(montant, email, telephone, nom) {
    // Construire le message WhatsApp
    let msg = "🛒 *NOUVELLE COMMANDE Ets MAHOUDO*\n\n";
    msg += `👤 Nom : ${nom}\n`;
    msg += `📧 Email : ${email}\n`;
    msg += `📱 Téléphone : ${telephone}\n\n`;
    msg += "📦 *Détails de la commande :*\n";
    
    let total = 0;
    panier.forEach(item => {
        msg += `- ${item.nom} × ${item.quantite} = ${item.prix * item.quantite} FCFA\n`;
        total += item.prix * item.quantite;
    });
    msg += `\n💰 *TOTAL : ${total} FCFA*`;

    const messageEncode = encodeURIComponent(msg);
    const lienWhatsApp = `https://wa.me/2290199579160?text=${messageEncode}`;

    // Essayer KKiaPay
    if (typeof kkiapay !== 'undefined') {
        const isSandbox = true;
        kkiapay.payment({
            amount: montant,
            api_key: KKIAPAY_API_KEY,
            sandbox: isSandbox,
            email: email,
            phone: telephone,
            name: nom,
            theme: "light",
            callback: function(response) {
                console.log("✅ Paiement réussi !", response);
                alert("✅ Paiement réussi ! Nous vous contacterons sous 24h.");
                panier = [];
                mettreAJourPanier();
                afficherPage('accueil');
            },
            onClose: function() {
                console.log("Fenêtre de paiement fermée");
            }
        });
    } else {
        // Fallback WhatsApp
        alert("💬 Paiement en ligne indisponible. Commande via WhatsApp.");
        window.open(lienWhatsApp, '_blank');
        panier = [];
        mettreAJourPanier();
        afficherPage('accueil');
        messageStatus.textContent = '📤 Commande envoyée !';
        setTimeout(() => { messageStatus.textContent = ''; }, 5000);
        }
    
}

} else if (nomPage === 'avis') {
    // Récupérer les avis sauvegardés

    // Calculer la note moyenne
    let noteMoyenne = 0;
    if (avis.length > 0) {
        let total = 0;
        avis.forEach(a => total += a.note);
        noteMoyenne = (total / avis.length).toFixed(1);
    }

    // Générer les étoiles HTML
    function genererEtoiles(note) {
        let etoiles = '';
        for (let i = 1; i <= 5; i++) {
            etoiles += i <= note ? '⭐' : '☆';
        }
        return etoiles;
    }

    // Générer la liste des avis
    let listeAvisHtml = '';
    if (avis.length === 0) {
        listeAvisHtml = `<div class="avis-vide">📝 Aucun avis pour le moment. Soyez le premier à donner votre avis !</div>`;

        // Trier les avis du plus récent au plus ancien
        const avisTries = [...avis].reverse();
        avisTries.forEach(a => {
            const date = new Date(a.date);
            const dateFormatee = date.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
            listeAvisHtml += `
                <div class="avis-item">
                    <div class="avis-nom">👤 ${a.nom}</div>

    const avisNote = document.getElementById('avisNote');

    etoiles.forEach(etoile => {
        etoile.addEventListener('click', function() {
            const note = parseInt(this.dataset.note);
            avisNote.value = note;
            etoiles.forEach(e => {
                const n = parseInt(e.dataset.note);
                if (n <= note) {
                    e.textContent = '⭐';
                    e.classList.add('active');
                } else {
                    e.textContent = '☆';
                    e.classList.remove('active');
                }

    });

            return;

            return;

        avis.push({
            nom: nom,
            note: note,
            commentaire: commentaire,
            date: new Date().toISOString()
        });
        localStorage.setItem('avis_ets_mahoudo', JSON.stringify(avis));

        alert("✅ Merci pour votre avis ! Il sera affiché immédiatement.");

// 6. FONCTION FAQ (toggle)
// ============================================================
window.toggleFAQ = function(element) {
    // Trouver la réponse
    const reponse = element.nextElementSibling;
    const icone = element.querySelector('.icone');

    // Fermer toutes les autres FAQ
    document.querySelectorAll('.faq-reponse').forEach(r => {
        if (r !== reponse && r.classList.contains('ouvert')) {
            r.classList.remove('ouvert');
            const parent = r.closest('.faq-item');
            if (parent) {
                const icon = parent.querySelector('.icone');
                if (icon) icon.classList.remove('ouvert');
            }
        }
    });

    // Ouvrir/fermer celle-ci
    reponse.classList.toggle('ouvert');
    icone.classList.toggle('ouvert');
};</script>
