<!-- KKiaPay Script -->
<script src="https://cdn.kkiapay.me/kp.js"></script>

<script>
// ============================================================
// 🔑 1. CONFIGURATION (À MODIFIER)
// ============================================================

// 🔑 REMPLACE PAR TA CLÉ API KKIAPAY (Public Api Key)
const KKIAPAY_API_KEY = "bef0154dc176f790b8c5499857619613f800ddd8";

// 🖼️ REMPLACE PAR TES VRAIS LIENS D'IMAGES
const IMAGES = {
    gel: "https://i.ibb.co/placeholder-gel.jpg",
    miel: "https://i.ibb.co/placeholder-miel.jpg",
    savon: "https://i.ibb.co/placeholder-savon.jpg",
    herbes: "https://i.ibb.co/placeholder-herbes.jpg"
};

// ============================================================
// 2. PANIER
// ============================================================
let panier = [];

const panierNombre = document.getElementById('panierNombre');
const panierTotal = document.getElementById('panierTotal');
const btnViderPanier = document.getElementById('btnViderPanier');
const messageStatus = document.getElementById('messageStatus');

function ajouterAuPanier(nom, prix) {
    const existant = panier.find(item => item.nom === nom);
    if (existant) {
        existant.quantite += 1;
    } else {
        panier.push({ nom, prix, quantite: 1 });
    }
    mettreAJourPanier();
    messageStatus.textContent = '✅ ' + nom + ' ajouté !';
    setTimeout(() => { messageStatus.textContent = ''; }, 3000);
}

function viderPanier() {
    if (panier.length === 0) {
        messageStatus.textContent = '🛒 Panier déjà vide';
        setTimeout(() => { messageStatus.textContent = ''; }, 2000);
        return;
    }
    if (confirm('⚠️ Vider tout le panier ?')) {
        panier = [];
        mettreAJourPanier();
        messageStatus.textContent = '🗑️ Panier vidé !';
        setTimeout(() => { messageStatus.textContent = ''; }, 2000);
    }
}

function mettreAJourPanier() {
    let nombre = 0;
    let total = 0;
    panier.forEach(item => {
        nombre += item.quantite;
        total += item.prix * item.quantite;
    });
    panierNombre.textContent = nombre;
    panierTotal.textContent = total.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ") + ' FCFA';
}

btnViderPanier.addEventListener('click', viderPanier);

// ============================================================
// 3. PAIEMENT KKIAPAY
// ============================================================
function lancerPaiementKKiaPay(montant, email, telephone, nom) {
    // Construire le message WhatsApp (fallback)
    let msg = "🛒 *NOUVELLE COMMANDE Ets MAHOUDO*\n\n";
    msg += `👤 Nom : ${nom}\n📧 Email : ${email}\n📱 Tél : ${telephone}\n\n📦 Détails :\n`;
    let total = 0;
    panier.forEach(item => {
        msg += `- ${item.nom} × ${item.quantite} = ${item.prix * item.quantite} FCFA\n`;
        total += item.prix * item.quantite;
    });
    msg += `\n💰 TOTAL : ${total} FCFA`;
    const lienWhatsApp = `https://wa.me/2290199579160?text=${encodeURIComponent(msg)}`;

    // Essayer KKiaPay
    if (typeof kkiapay !== 'undefined') {
        const isSandbox = true;
        kkiapay.payment({
            amount: montant,
            api_key: KKIAPAY_API_KEY,
            sandbox: isSandbox,
            email: email,
            phone: telephone,
            name: nom,
            theme: "light",
            callback: function(response) {
                console.log("✅ Paiement réussi !", response);
                alert("✅ Paiement réussi ! Nous vous contacterons sous 24h.");
                let ventes = parseInt(localStorage.getItem('ventes_ets_mahoudo')) || 0;
                ventes += 1;
                localStorage.setItem('ventes_ets_mahoudo', ventes);
                panier = [];
                mettreAJourPanier();
                afficherPage('accueil');
                messageStatus.textContent = '📦 Commande payée !';
                setTimeout(() => { messageStatus.textContent = ''; }, 5000);
            },
            onClose: function() {
                console.log("Fenêtre de paiement fermée");
                messageStatus.textContent = '❌ Paiement annulé';
                setTimeout(() => { messageStatus.textContent = ''; }, 3000);
            }
        });
    } else {
        // Fallback WhatsApp
        alert("💬 Paiement en ligne indisponible. Commande via WhatsApp.");
        window.open(lienWhatsApp, '_blank');
        let ventes = parseInt(localStorage.getItem('ventes_ets_mahoudo')) || 0;
        ventes += 1;
        localStorage.setItem('ventes_ets_mahoudo', ventes);
        panier = [];
        mettreAJourPanier();
        afficherPage('accueil');
        messageStatus.textContent = '📤 Commande envoyée !';
        setTimeout(() => { messageStatus.textContent = ''; }, 5000);
    }
}

// FIN PARTIE 2// ============================================================
// 4. MENU
// ============================================================
const zoneContenu = document.getElementById('zoneContenu');
const menuItems = document.querySelectorAll('.menu-item');

function afficherPage(nomPage) {

        item.classList.remove('active');

            item.classList.add('active');

    let ventes = parseInt(localStorage.getItem('ventes_ets_mahoudo')) || 0;

    if (nomPage === 'accueil') {

                <p style="margin-top:10px;">Vous pouvez également débattre le prix de vos produits commandé avec nous car le temps n'est pas si favorable à quiconque</p>
                <div class="compteur-ventes">🔥 <span>${ventes}</span> 25 personnes ont acheté aujourd'hui !</div>
                <p style="margin-top:10px;">🌿 Découvrez nos produits de bien-être et traditionnels.</p>
                <p style="font-size:14px; color:#888;">📞 Contactez-nous pour toute question.</p>
            </div>
        `;
    }

    else if (nomPage === 'a-propos') {
        zoneContenu.innerHTML = `
            <div class="page-a-propos">
                <h2 style="color:#b8860b; text-align:center;">📖 À propos de Ets MAHOUDO</h2>
                <p style="text-align:center; font-size:16px; color:#555;"><em>"La nature au service de votre bien-être"</em></p>
                <h3>🌿 Notre histoire</h3>
                <p>Ets MAHOUDO est une entreprise familiale basée au Bénin, spécialisée dans la vente de produits naturels et traditionnels.</p>
                <h3>🧴 Nos produits</h3>
                <ul style="margin-left:20px;">
                    <li>🧴 Bien-être : gels douche, miel, savons</li>
                    <li>🌿 Traditionnels : plantes pour la toux, hémorroïdes, vitalité</li>
                </ul>
                <h3>🤝 Nos valeurs</h3>
                <div class="valeur-box"><strong>🌱 Naturel</strong> — Sans produits chimiques</div>
                <div class="valeur-box"><strong>🤲 Authenticité</strong> — Savoir-faire traditionnel</div>
                <div class="valeur-box"><strong>💚 Confiance</strong> — Transparence et honnêteté</div>
                <div style="margin-top:20px; background:#f0f7f0; padding:15px; border-radius:10px; text-align:center;">
                    <p style="font-size:14px; color:#888;">⚠️ Informations à titre informatif. Consultez un professionnel de santé.</p>
                </div>
            </div>
        `;
    }

    else if (nomPage === 'produits') {
